name: saki_engine_demo
description: "SakiEngine sample game project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  sakiengine:
    path: ../../Engine

dependency_overrides:
  media_kit:
    path: ../../third_party/media_kit_hotfix
  media_kit_libs_windows_video:
    path: ../../third_party/media_kit_libs_windows_video_hotfix
  flutter_steamworks:
    path: ../../third_party/flutter_steamworks_hotfix

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - default_game.txt
    - Assets/fonts/SourceHanSansCN-Bold.ttf
    - Assets/images/backgrounds/bg-school.webp
    - Assets/images/backgrounds/sky.jpg
    - Assets/images/characters/xiayo-happy.png
    - Assets/images/characters/xiayo-pose1.png
    - Assets/images/characters/yuki-eye.png
    - Assets/images/characters/yuki-eye2.png
    - Assets/images/characters/yuki-happy.png
    - Assets/images/characters/yuki-pose1.png
    - Assets/images/characters/yuki-pose2.png
    - Assets/images/characters/yuki-sad.png
    - Assets/images/characters/yuki-say.png
    - Assets/images/characters/yuki-shy.png
    - Assets/images/characters/yuki-star.png
    - Assets/images/characters/yuki-think.png
  fonts:
    - family: SourceHanSansCN
      fonts:
        - asset: Assets/fonts/SourceHanSansCN-Bold.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  web:
    generate: true
    image_path: "icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "icon.png"
  macos:
    generate: true
    image_path: "icon.png"
