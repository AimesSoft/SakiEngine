name: saki_engine_demo
description: "SakiEngine sample game project"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  sakiengine:
    path: ../../Engine

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - default_game.txt
    - Assets/
    - GameScript/
    - GameScript_en/
    - GameScript_ja/
    - GameScript_zh-Hant/
  fonts:
    - family: SourceHanSansCN
      fonts:
        - asset: Assets/fonts/SourceHanSansCN-Bold.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  windows:
    generate: true
    image_path: "icon.png"
  macos:
    generate: true
    image_path: "icon.png"
