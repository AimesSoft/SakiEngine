name: CI / Build / Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          flutter-version: '3.35.1'
          channel: stable
          cache: true

      - name: Engine Pub Get
        working-directory: Engine
        run: flutter pub get

      - name: Engine Analyze
        working-directory: Engine
        run: flutter analyze

      - name: Engine Test
        working-directory: Engine
        run: flutter test

      - name: Demo Pub Get
        working-directory: Game/SakiEngine
        run: flutter pub get

      - name: Demo Analyze
        working-directory: Game/SakiEngine
        run: flutter analyze

      - name: Demo Test
        working-directory: Game/SakiEngine
        run: flutter test

  build-android:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Build Android
    uses: ./.github/workflows/android-build.yml
    with:
      flutter_version: '3.35.1'
      working_directory: Engine
      target_platform: android-arm64
    secrets: inherit

  build-ios:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Build iOS
    uses: ./.github/workflows/ios-build.yml
    with:
      flutter_version: '3.35.1'
      working_directory: Engine
      enable_codesign: false
    secrets: inherit

  build-macos:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Build macOS
    uses: ./.github/workflows/macos-build.yml
    with:
      flutter_version: '3.35.1'
      working_directory: Engine
      create_dmg: true
    secrets: inherit

  build-windows:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Build Windows
    uses: ./.github/workflows/windows-build.yml
    with:
      flutter_version: '3.35.1'
      working_directory: Engine
      architecture: x64
    secrets: inherit

  build-linux:
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: Build Linux
    uses: ./.github/workflows/linux-build.yml
    with:
      flutter_version: '3.35.1'
      working_directory: Engine
      architecture: amd64
    secrets: inherit

  publish:
    name: Publish Release
    needs:
      - build-android
      - build-ios
      - build-macos
      - build-windows
      - build-linux
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/publish.yml
    with:
      version: ${{ needs.build-android.outputs.version }}
      artifacts_pattern: /tmp/artifacts/release-Android/*.apk,/tmp/artifacts/release-iOS/*.ipa,/tmp/artifacts/release-macOS/*.dmg,/tmp/artifacts/release-Windows/*.zip,/tmp/artifacts/release-Linux-amd64/*.zip
    secrets: inherit

  update-version:
    name: Update Version
    needs:
      - publish
      - build-android
      - build-ios
      - build-macos
      - build-windows
      - build-linux
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
    uses: ./.github/workflows/version-update.yml
    with:
      working_directory: Engine
      version_increment: patch
      branch: main
    secrets: inherit
