name: CI / Build / Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          flutter-version: '3.35.1'
          channel: stable
          cache: true

      - name: Engine Pub Get
        working-directory: Engine
        run: flutter pub get

      - name: Engine Analyze
        working-directory: Engine
        run: flutter analyze

      - name: Engine Test
        working-directory: Engine
        run: flutter test

      - name: Demo Pub Get
        working-directory: Game/SakiEngine
        run: flutter pub get

      - name: Demo Analyze
        working-directory: Game/SakiEngine
        run: flutter analyze

      - name: Demo Test
        working-directory: Game/SakiEngine
        run: flutter test

  check-build-target:
    name: Check Game Build Trigger
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      game_name: ${{ steps.check.outputs.game_name }}
      game_dir: ${{ steps.check.outputs.game_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files
        id: check
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          GAME_NAME=$(cat default_game.txt 2>/dev/null | tr -d '\r\n' | xargs || true)
          if [[ -z "$GAME_NAME" ]]; then
            echo "⚠️ 未读取到 default_game.txt，跳过构建"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          GAME_DIR="Game/$GAME_NAME"
          echo "🎯 默认游戏: $GAME_NAME"
          echo "📁 目标目录: $GAME_DIR/"
          echo "game_name=$GAME_NAME" >> "$GITHUB_OUTPUT"
          echo "game_dir=$GAME_DIR/" >> "$GITHUB_OUTPUT"

          if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            CHANGED_FILES=$(git show --name-only --pretty='' "$CURRENT_SHA")
          else
            CHANGED_FILES=$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")
          fi

          echo "🧾 本次改动文件:"
          echo "$CHANGED_FILES"

          should_run=false
          while IFS= read -r file; do
            [[ -n "$file" ]] || continue
            if [[ "$file" == "$GAME_DIR" || "$file" == "$GAME_DIR/"* || "$file" == "default_game.txt" ]]; then
              should_run=true
              break
            fi
          done <<< "$CHANGED_FILES"

          if [[ "$should_run" == "true" ]]; then
            echo "✅ 命中游戏项目目录改动，触发构建"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "⏭️ 未命中游戏项目目录改动，跳过构建"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  build-android:
    needs: [quality, check-build-target]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-build-target.outputs.should_run == 'true'
    name: Build Android
    uses: ./.github/workflows/android-build.yml
    with:
      flutter_version: '3.35.1'
      working_directory: Engine
      target_platform: android-arm64
    secrets: inherit

  build-ios:
    needs: [quality, check-build-target]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-build-target.outputs.should_run == 'true'
    name: Build iOS
    uses: ./.github/workflows/ios-build.yml
    with:
      flutter_version: '3.35.1'
      working_directory: Engine
      enable_codesign: false
    secrets: inherit

  build-macos:
    needs: [quality, check-build-target]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-build-target.outputs.should_run == 'true'
    name: Build macOS
    uses: ./.github/workflows/macos-build.yml
    with:
      flutter_version: '3.35.1'
      working_directory: Engine
      create_dmg: true
    secrets: inherit

  build-windows:
    needs: [quality, check-build-target]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-build-target.outputs.should_run == 'true'
    name: Build Windows
    uses: ./.github/workflows/windows-build.yml
    with:
      flutter_version: '3.35.1'
      working_directory: Engine
      architecture: x64
    secrets: inherit

  build-linux:
    needs: [quality, check-build-target]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-build-target.outputs.should_run == 'true'
    name: Build Linux
    uses: ./.github/workflows/linux-build.yml
    with:
      flutter_version: '3.35.1'
      working_directory: Engine
      architecture: amd64
    secrets: inherit

  publish:
    name: Publish Release
    needs:
      - check-build-target
      - build-android
      - build-ios
      - build-macos
      - build-windows
      - build-linux
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-build-target.outputs.should_run == 'true'
    uses: ./.github/workflows/publish.yml
    with:
      version: ${{ needs.build-android.outputs.version }}
      artifacts_pattern: /tmp/artifacts/release-Android/*.apk,/tmp/artifacts/release-iOS/*.ipa,/tmp/artifacts/release-macOS/*.dmg,/tmp/artifacts/release-Windows/*.zip,/tmp/artifacts/release-Linux-amd64/*.zip
    secrets: inherit

  update-version:
    name: Update Version
    needs:
      - check-build-target
      - publish
      - build-android
      - build-ios
      - build-macos
      - build-windows
      - build-linux
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check-build-target.outputs.should_run == 'true' && success()
    uses: ./.github/workflows/version-update.yml
    with:
      working_directory: Engine
      version_increment: patch
      branch: main
    secrets: inherit
